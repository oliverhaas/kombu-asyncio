name: Tag

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check version status
        id: version
        run: |
          CURRENT_VERSION=$(grep -m1 'version = ' pyproject.toml | cut -d'"' -f2)
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          if curl -s "https://pypi.org/pypi/kombu-asyncio/$CURRENT_VERSION/json" | grep -q '"version"'; then
            echo "on_pypi=true" >> $GITHUB_OUTPUT
          else
            echo "on_pypi=false" >> $GITHUB_OUTPUT
          fi

          git fetch --tags
          if git rev-parse "v$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.version.outputs.on_pypi == 'false' && steps.version.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.current }}"
          git push origin "v${{ steps.version.outputs.current }}"

      - name: Trigger publish workflow
        if: steps.version.outputs.on_pypi == 'false'
        run: gh workflow run publish.yml -f version=${{ steps.version.outputs.current }}
        env:
          GH_TOKEN: ${{ github.token }}
